<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024"
     xmlns="http://www.w3.org/2000/svg" role="img"
     aria-label="Four-player scoreboard app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#17683D"/>
      <stop offset="100%" stop-color="#0F5632"/>
    </linearGradient>

    <linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF9EA"/>
      <stop offset="100%" stop-color="#F2E7CE"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="14"
                    flood-color="#063820" flood-opacity="0.28"/>
    </filter>

    <filter id="tokenShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="7"
                    flood-color="#082E1D" flood-opacity="0.30"/>
    </filter>

    <clipPath id="roundedIcon">
      <rect x="48" y="48" width="928" height="928" rx="218"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedIcon)">
    <rect x="48" y="48" width="928" height="928" rx="218" fill="url(#bg)"/>

    <!-- Central game table -->
    <circle cx="512" cy="512" r="222"
            fill="url(#table)" filter="url(#softShadow)"/>
    <circle cx="512" cy="512" r="222"
            fill="none" stroke="#E4D5B4" stroke-width="5"/>

    <!-- Minimal four-way score division -->
    <g stroke="#C7B892" stroke-width="16" stroke-linecap="round" opacity="0.92">
      <line x1="512" y1="354" x2="512" y2="438"/>
      <line x1="512" y1="586" x2="512" y2="670"/>
      <line x1="354" y1="512" x2="438" y2="512"/>
      <line x1="586" y1="512" x2="670" y2="512"/>
    </g>

    <!-- Four players: circles only, no semicircle shapes -->
    <g filter="url(#tokenShadow)">
      <circle cx="512" cy="192" r="72" fill="#F04432"/>
      <circle cx="192" cy="512" r="72" fill="#3978B9"/>
      <circle cx="832" cy="512" r="72" fill="#57964B"/>
      <circle cx="512" cy="832" r="72" fill="#F4B62F"/>
    </g>

    <!-- Soft highlights for iOS-like depth -->
    <g fill="none" stroke="#FFFFFF" stroke-width="7" opacity="0.16">
      <path d="M472 165 A72 72 0 0 1 550 137"/>
      <path d="M153 484 A72 72 0 0 1 228 459"/>
      <path d="M793 484 A72 72 0 0 1 868 459"/>
      <path d="M473 804 A72 72 0 0 1 548 779"/>
    </g>
  </g>
</svg>
